name: Docker CI

on:
  push:
    branches: "*"
  pull_request:
    branches: "*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image-portability:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for target platform
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file docker/Dockerfile \
            --tag coinswap:ci \
            --load \
            .

      - name: Smoke test makerd
        run: docker run --rm --platform ${{ matrix.platform }} coinswap:ci makerd --help

      - name: Smoke test taker
        run: docker run --rm --platform ${{ matrix.platform }} coinswap:ci taker --help

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: ./docker-setup build

      - name: Test makerd
        run: docker run --rm coinswap:latest makerd --help

      - name: Test taker
        run: docker run --rm coinswap:latest taker --help
